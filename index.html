<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐹 햄스터 레이스</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#FFF8F0;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;max-width:480px;margin:0 auto}
.screen{display:none;padding:14px 14px 40px}
.screen.active{display:block}
h1{text-align:center;font-size:22px;font-weight:800;color:#FF6B35;margin-bottom:2px}

.hero{background:linear-gradient(135deg,#FF6B35,#FFB800);border-radius:20px;padding:18px 16px 14px;margin-bottom:14px;text-align:center;color:#fff}
.hero h1{color:#fff;font-size:24px;margin-bottom:2px}
.hero p{font-size:12px;opacity:0.9}

.card{background:#fff;border:2px solid #FFD9B0;border-radius:18px;padding:14px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:800;color:#FF6B35;margin-bottom:10px}

.name-input{width:100%;padding:13px 14px;border:2px solid #FFD9B0;border-radius:12px;font-size:16px;color:#5C3317;background:#FFF8F0;outline:none;margin-bottom:10px;display:block}
.name-input:focus{border-color:#FF6B35}

.carousel{display:flex;gap:8px;overflow-x:auto;padding:4px 2px 10px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;margin-bottom:10px}
.carousel::-webkit-scrollbar{height:4px}
.carousel::-webkit-scrollbar-thumb{background:#FFD9B0;border-radius:4px}
.hslot{flex-shrink:0;width:66px;scroll-snap-align:center;background:#FFF8F0;border:2.5px solid #FFD9B0;border-radius:14px;padding:4px;cursor:pointer;text-align:center;transition:border-color 0.15s,transform 0.15s;position:relative;user-select:none;-webkit-user-select:none}
.hslot.sel{border-color:#FF6B35;background:#FFF0E8;box-shadow:0 0 0 3px rgba(255,107,53,0.25)}
.hslot.taken{opacity:0.28;cursor:not-allowed}
.hslot canvas{display:block;width:58px;height:50px;border-radius:8px;pointer-events:none}
.hslot .hn{font-size:9px;font-weight:700;color:#FFAA70;margin-top:2px;pointer-events:none}
.sel-tick{position:absolute;top:-7px;right:-7px;background:#FF6B35;color:#fff;border-radius:50%;width:20px;height:20px;font-size:12px;display:flex;align-items:center;justify-content:center;font-weight:900;pointer-events:none}

.btn-row{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:13px 16px;border:none;border-radius:12px;cursor:pointer;font-size:14px;font-weight:800;width:100%;-webkit-appearance:none;appearance:none;touch-action:manipulation}
.btn:active{opacity:0.8;transform:scale(0.96)}
.btn-orange{background:#FF6B35;color:#fff}
.btn-rand{background:#C97AFF;color:#fff;flex-shrink:0;width:auto;white-space:nowrap}
.btn-green{background:#44C97A;color:#fff}
.btn-purple{background:#9B59B6;color:#fff}
.btn-gray{background:#F0E8E0;color:#AA6633}

.pitem{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:12px;background:#FFF8F0;margin-bottom:6px}
.pitem canvas{width:36px;height:36px;border-radius:8px;flex-shrink:0}
.pitem .pn{flex:1;font-size:13px;font-weight:700;color:#5C3317}
.pitem .rm{color:#FF85A1;font-size:24px;cursor:pointer;padding:0 4px;line-height:1;touch-action:manipulation}

.settings-row{display:flex;align-items:center;gap:10px;background:#fff;border:2px solid #FFD9B0;border-radius:14px;padding:12px 14px;margin-bottom:12px}
.settings-row label{font-size:13px;color:#AA6633;flex:1;font-weight:700;line-height:1.5}
.settings-row input{width:60px;padding:8px;border:2px solid #FF6B35;border-radius:10px;color:#FF6B35;font-size:18px;text-align:center;font-weight:800;background:#FFF8F0;outline:none}

#race-screen{padding:8px;background:#FFF8F0}
.race-wrap{position:relative;width:100%}
#race-canvas{display:block;width:100%;border-radius:16px;border:2px solid #FFD9B0}
.cd-overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,248,240,0.95);border-radius:16px;z-index:10}
.cd-num{font-size:88px;font-weight:900;color:#FF6B35;line-height:1;animation:popIn 0.4s ease-out}
.cd-go{font-size:46px;font-weight:900;color:#44C97A;animation:popIn 0.35s ease-out}
.cd-msg{font-size:13px;color:#AA6633;margin-top:8px;font-weight:700;text-align:center}
@keyframes popIn{from{transform:scale(0.1);opacity:0}to{transform:scale(1);opacity:1}}
.big-announce{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,248,240,0.97);border-radius:16px;z-index:20;padding:20px;text-align:center}
.big-announce h2{font-size:24px;font-weight:900;color:#FF6B35;margin-bottom:10px}
.big-announce .ll{font-size:16px;color:#5C3317;font-weight:700;line-height:2.2}
.big-announce .bs{font-size:13px;color:#FFAA70;margin-top:12px;font-weight:600}
.big-announce .be{font-size:40px;margin-bottom:8px}

.ann{background:linear-gradient(135deg,#FF6B35,#FFB800);border-radius:16px;padding:18px;text-align:center;margin-bottom:14px;color:#fff}
.ann h2{font-size:20px;font-weight:900}
.ann p{font-size:13px;margin-top:6px;opacity:0.92;line-height:1.6}
.rcard{background:#fff;border-radius:14px;padding:11px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;border:1.5px solid #FFE8D0;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.rcard.winner{border:2px solid #FF6B35;background:#FFF5EF}
.rrank{font-size:28px;font-weight:900;min-width:44px;text-align:center}
.rname{font-size:15px;font-weight:800;color:#5C3317}
.rsub{font-size:11px;color:#FFAA70;margin-top:2px}
.wbadge{background:#FF6B35;color:#fff;font-size:10px;padding:3px 9px;border-radius:20px;font-weight:800;margin-left:6px;display:inline-block;vertical-align:middle}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal-sheet{background:#fff;border-radius:24px 24px 0 0;padding:28px 22px 50px;width:100%;max-width:480px;text-align:center}
.creator-avatar{width:110px;height:110px;border-radius:50%;object-fit:cover;margin:0 auto 14px;display:block;border:4px solid #FFD9B0}
.creator-name{font-size:18px;font-weight:900;color:#FF6B35;margin-bottom:4px}
.creator-bio{font-size:13px;color:#FFAA70;margin-bottom:20px;line-height:1.6}
.acct-box{background:#FFF8F0;border:2px solid #FFD9B0;border-radius:16px;padding:16px;margin-bottom:14px}
.acct-bank{font-size:12px;color:#FFAA70;font-weight:700;margin-bottom:4px}
.acct-num{font-size:24px;font-weight:900;color:#5C3317;letter-spacing:2px}
</style>
</head>
<body>

<div id="setup-screen" class="screen active">
  <div class="hero">
    <h1>🐹 햄스터 레이스 🏁</h1>
    <p>식사 내기의 최강자를 가립시다!</p>
  </div>

  <div class="card">
    <div class="card-title">👥 참가자 추가</div>
    <input class="name-input" type="text" id="player-name" placeholder="이름 입력 후 햄찌 선택!" maxlength="8" autocomplete="off">
    <div class="carousel" id="carousel"></div>
    <div class="btn-row">
      <button class="btn btn-rand" id="btn-rand">🎲 랜덤</button>
      <button class="btn btn-orange" id="btn-add">추가 ＋</button>
    </div>
  </div>

  <div class="card" id="plist-wrap" style="display:none">
    <div class="card-title">🐾 참가자 목록 (<span id="pcount">0</span>명)</div>
    <div id="plist"></div>
  </div>

  <div class="settings-row">
    <label>🏆 당첨 인원<br><span style="font-size:11px;font-weight:400;color:#FFAA70">이 순위까지 한턱 쏩니다</span></label>
    <input type="number" id="wcount" value="1" min="1" max="10">
  </div>

  <button class="btn btn-green" id="btn-start" style="margin-bottom:10px;font-size:16px;padding:15px">🚀 레이스 시작!</button>
  <button class="btn btn-purple" id="btn-donate" style="font-size:14px;padding:13px">💜 제작자 후원하기</button>
</div>

<div id="race-screen" class="screen">
  <h1 style="margin-bottom:8px">🏁 달려라 햄찌!</h1>
  <div class="race-wrap">
    <canvas id="race-canvas"></canvas>
    <div class="cd-overlay" id="cd-overlay">
      <div id="cd-content"></div>
      <div id="cd-msg" style="font-size:13px;color:#AA6633;margin-top:8px;font-weight:700;text-align:center"></div>
    </div>
    <div class="big-announce" id="big-announce"></div>
  </div>
</div>

<div id="result-screen" class="screen">
  <h1>🎉 레이스 결과!</h1>
  <div class="ann" id="ann-box"></div>
  <div id="rlist"></div>
  <button class="btn btn-orange" id="btn-reset" style="font-size:16px;padding:15px;margin-top:6px;margin-bottom:10px">🔄 다시하기</button>
  <button class="btn btn-purple" id="btn-donate2" style="font-size:14px;padding:13px">💜 제작자 후원하기</button>
</div>

<div class="modal-bg" id="donate-modal">
  <div class="modal-sheet">
    <img class="creator-avatar" id="creator-img" src="" alt="제작자">
    <div class="creator-name">햄스터 레이스 제작자</div>
    <div class="creator-bio">이 게임이 즐거우셨다면<br>커피 한 잔 사주세요 ☕🙏</div>
    <div class="acct-box">
      <div class="acct-bank">🏦 토스뱅크</div>
      <div class="acct-num">1000-6650-2887</div>
    </div>
    <button class="btn btn-orange" id="btn-copy" style="margin-bottom:10px">📋 계좌번호 복사하기</button>
    <button class="btn btn-gray" id="btn-close-modal">닫기</button>
  </div>
</div>

// ===== SPRITE DRAWING =====
function makeSprite(i) {
  var c = document.createElement('canvas');
  c.width = 80; c.height = 80;
  var x = c.getContext('2d'), col = HC[i % HC.length];
  x.fillStyle = col;
  x.beginPath(); x.ellipse(40,50,26,20,0,0,Math.PI*2); x.fill();
  x.beginPath(); x.ellipse(40,32,19,19,0,0,Math.PI*2); x.fill();
  x.fillStyle = '#8B5E3C';
  x.beginPath(); x.ellipse(27,19,7,9.5,-0.35,0,Math.PI*2); x.fill();
  x.beginPath(); x.ellipse(53,19,7,9.5,0.35,0,Math.PI*2); x.fill();
  x.fillStyle = '#FFB6C1';
  x.beginPath(); x.ellipse(27,18,3.5,6,-0.35,0,Math.PI*2); x.fill();
  x.beginPath(); x.ellipse(53,18,3.5,6,0.35,0,Math.PI*2); x.fill();
  x.fillStyle = '#111';
  x.beginPath(); x.arc(33,30,4,0,Math.PI*2); x.fill();
  x.beginPath(); x.arc(47,30,4,0,Math.PI*2); x.fill();
  x.fillStyle = '#fff';
  x.beginPath(); x.arc(34.5,28.5,1.5,0,Math.PI*2); x.fill();
  x.beginPath(); x.arc(48.5,28.5,1.5,0,Math.PI*2); x.fill();
  x.fillStyle = '#FFB6C1';
  x.beginPath(); x.ellipse(33,36,4,2.8,0,0,Math.PI*2); x.fill();
  x.beginPath(); x.ellipse(47,36,4,2.8,0,0,Math.PI*2); x.fill();
  x.fillStyle = '#CC7755';
  x.beginPath(); x.arc(40,38,3,0,Math.PI*2); x.fill();
  x.fillStyle = 'rgba(255,255,255,0.35)';
  x.beginPath(); x.ellipse(40,52,13,7,0,0,Math.PI*2); x.fill();
  return c;
}

function initSprites() {
  sprites = [];
  for (var i = 0; i < 30; i++) sprites.push(makeSprite(i));
}

function loadFromImage() {
  if (!masterImg) return;
  var iw = masterImg.naturalWidth, ih = masterImg.naturalHeight;
  var rows = [{cols:8,h:ih*0.215},{cols:8,h:ih*0.215},{cols:8,h:ih*0.215},{cols:4,h:ih*0.175},{cols:6,h:ih*0.175}];
  sprites = [];
  var ry = 0;
  for (var r = 0; r < rows.length; r++) {
    var cw = iw / rows[r].cols;
    for (var cl = 0; cl < rows[r].cols; cl++) {
      if (sprites.length >= 30) break;
      var sc = document.createElement('canvas');
      sc.width = Math.round(cw); sc.height = Math.round(rows[r].h);
      var ctx = sc.getContext('2d');
      ctx.drawImage(masterImg, cl*cw, ry, cw, rows[r].h, 0, 0, sc.width, sc.height);
      var id = ctx.getImageData(0, 0, sc.width, sc.height), d = id.data;
      for (var p = 0; p < d.length; p += 4) {
        var br = (d[p]+d[p+1]+d[p+2])/3;
        if (br < 45) d[p+3] = 0;
        else if (br < 80) d[p+3] = Math.round(((br-45)/35)*d[p+3]);
      }
      ctx.putImageData(id, 0, 0);
      sprites.push(sc);
    }
    ry += rows[r].h;
  }
  while (sprites.length < 30) sprites.push(makeSprite(sprites.length));
}

function loadHamsterImage() {
  fetch('/mnt/user-data/uploads/' + encodeURIComponent('햄스터_30마리.png'))
    .then(function(r) { return r.blob(); })
    .then(function(blob) {
      var rd = new FileReader();
      rd.onload = function(e) {
        var img = new Image();
        img.onload = function() { masterImg = img; loadFromImage(); buildCarousel(); };
        img.src = e.target.result;
      };
      rd.readAsDataURL(blob);
    })
    .catch(function() {});
}

// ===== CAROUSEL =====
function buildCarousel() {
  var taken = {};
  players.forEach(function(p) { taken[p.hi] = true; });
  var car = document.getElementById('carousel');
  car.innerHTML = '';
  for (var i = 0; i < 30; i++) {
    (function(idx) {
      var slot = document.createElement('div');
      slot.className = 'hslot' + (taken[idx] ? ' taken' : '') + (selIdx === idx ? ' sel' : '');
      slot.id = 'sl' + idx;

      var cv = document.createElement('canvas');
      cv.width = 58; cv.height = 50;
      if (sprites[idx]) {
        var ctx = cv.getContext('2d'), sc = sprites[idx];
        var s = Math.min(58/sc.width, 50/sc.height);
        ctx.drawImage(sc, (58-sc.width*s)/2, (50-sc.height*s)/2, sc.width*s, sc.height*s);
      }

      var lb = document.createElement('div');
      lb.className = 'hn';
      lb.textContent = '#' + (idx+1);

      slot.appendChild(cv);
      slot.appendChild(lb);

      if (selIdx === idx) {
        var tick = document.createElement('div');
        tick.className = 'sel-tick';
        tick.textContent = '✓';
        slot.appendChild(tick);
      }

      if (!taken[idx]) {
        slot.addEventListener('click', function() { selectH(idx); });
      }

      car.appendChild(slot);
    })(i);
  }
}

function selectH(i) {
  var taken = {};
  players.forEach(function(p) { taken[p.hi] = true; });
  if (taken[i]) return;
  selIdx = i;
  buildCarousel();
  var sl = document.getElementById('sl' + i);
  if (sl) sl.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
}

function randSelect() {
  var taken = {};
  players.forEach(function(p) { taken[p.hi] = true; });
  var avail = [];
  for (var i = 0; i < 30; i++) if (!taken[i]) avail.push(i);
  if (!avail.length) { alert('모든 햄찌가 선택됐어요!'); return; }
  selectH(avail[Math.floor(Math.random() * avail.length)]);
}

// ===== PLAYERS =====
function addPlayer() {
  var nm = document.getElementById('player-name').value.trim();
  if (!nm) { alert('이름을 입력하세요!'); return; }
  if (selIdx === null) { alert('햄찌를 선택하거나 🎲 랜덤을 눌러주세요!'); return; }
  if (players.length >= 30) { alert('최대 30명!'); return; }
  players.push({name: nm, hi: selIdx});
  selIdx = null;
  document.getElementById('player-name').value = '';
  document.getElementById('player-name').focus();
  buildCarousel();
  renderPlayers();
}

function removePlayer(i) {
  players.splice(i, 1);

  renderPlayers();
}

function renderPlayers() {
  var wrap = document.getElementById('plist-wrap');

  document.getElementById('pcount').textContent = players.length;
  if (!players.length) { wrap.style.display = 'none'; return; }

// ===== RACE =====
function startRace() {
  if (players.length < 2) { alert('최소 2명 이상!'); return; }
  winnerCount = Math.max(1, Math.min(parseInt(document.getElementById('wcount').value) || 1, players.length - 1));
  showScreen('race-screen');
  runRace();
}

function pickEvt() {
  var keys = Object.keys(EVT), total = 0;
  keys.forEach(function(k) { total += EVT[k].f; });
  var r = Math.random() * total;
  for (var i = 0; i < keys.length; i++) {
    r -= EVT[keys[i]].f;
    if (r <= 0) return keys[i];
  }
  return keys[0];
}

function runRace() {
  var canvas = document.getElementById('race-canvas');
  var ctx = canvas.getContext('2d');
  var n = players.length;
  var lH = Math.max(46, Math.min(78, Math.floor(440/n)));
  var W = Math.min(window.innerWidth - 20, 460);
  canvas.width = W;
  canvas.height = lH * n + 44;

  var TS = 82, TE = W - 10, TL = TE - TS;

  var ord = players.map(function(_, i) { return i; });
  for (var i = ord.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var t = ord[i]; ord[i] = ord[j]; ord[j] = t;
  }
  raceResults = ord.map(function(oi) { return players[oi]; });

  var WIN_T = 20000;
  var LCOLORS = ['#FF8C55','#FFA570','#FFC090','#44C97A','#6CB4FF','#FF85A1','#FFD700','#C97AFF','#FF6B35','#52B8C9'];

  var racers = raceResults.map(function(p, rank) {
    return {
      p: p, rank: rank, x: TS, prog: 0,
      tgt: WIN_T + rank * (1500 + Math.random() * 1300),
      done: false, fRank: null,
      lPh: 0, bY: 0, wob: 0,
      evt: null, evtT: 0, sMul: 1,
      bub: null, bubT: 0,
      fems: [],
      nextEvt: 2000 + Math.random() * 2800,
      lc: LCOLORS[rank % 10],
      lY: 28 + rank*lH + lH/2
    };
  });

  var st = null, lt = null, fdone = 0;
  var cdEl = document.getElementById('cd-overlay');
  var baEl = document.getElementById('big-announce');
  baEl.style.display = 'none';

  function doCountdown(n2, cb) {
    cdEl.style.display = 'flex';
    var cc = document.getElementById('cd-content');
    var cm = document.getElementById('cd-msg');
    if (n2 > 0) {
      cc.innerHTML = '<div class="cd-num">' + n2 + '</div>';
      cm.textContent = n2===3 ? '준비됐나요?' : n2===2 ? '햄찌들 파이팅!' : '이제 시작!';
      setTimeout(function() { doCountdown(n2-1, cb); }, 900);
    } else {
      cc.innerHTML = '<div class="cd-go">START! 🐾</div>';
      cm.textContent = '총총총총 달려라 햄찌!';
      setTimeout(function() { cdEl.style.display = 'none'; cb(); }, 600);
    }
  }

  function fireEvt(r, el) {
    var k = pickEvt(), cfg = EVT[k];
    r.evt = k; r.evtT = cfg.d; r.sMul = cfg.s;
    r.bub = {t: cfg.e + ' ' + cfg.b, c: cfg.c};
    r.bubT = Math.min(cfg.d, 1500);
    for (var e = 0; e < 4; e++) {
      r.fems.push({e:cfg.e, ox:(Math.random()-0.5)*28, oy:-18-Math.random()*18, vy:-1.4-Math.random()*0.8, vx:(Math.random()-0.5)*0.7, life:1, sz:11+Math.random()*7});
    }
    r.nextEvt = el + 1600 + Math.random() * 3000;
  }

  function frame(ts) {
    if (!st) st = ts;
    var el = ts - st, dt = lt ? Math.min(ts-lt, 50) : 16;
    lt = ts;

    racers.forEach(function(r) {
      if (r.done) return;
      if (el >= r.nextEvt && !r.evt) fireEvt(r, el);
      if (r.evtT > 0) { r.evtT -= dt; if (r.evtT <= 0) { r.evt = null; r.evtT = 0; r.sMul = 1; } }
      if (r.bubT > 0) { r.bubT -= dt; if (r.bubT <= 0) r.bub = null; }
      r.fems.forEach(function(fe) { fe.oy += fe.vy; fe.ox += fe.vx; fe.life -= dt/1100; });
      r.fems = r.fems.filter(function(fe) { return fe.life > 0; });

      var spd = (1/r.tgt) * r.sMul;
      r.prog = Math.max(0, Math.min(1, r.prog + spd*dt));
      r.x = TS + r.prog * TL;

      if (!r.done && r.prog >= 0.995) {
        r.done = true; fdone++;
        r.fRank = fdone;
        if (fdone <= winnerCount) { r.bub = {t:'🎊 ' + r.p.name + '님 쏩니다!', c:'#FF6B35'}; r.bubT = 3000; }
      }
      if (!r.done && r.sMul !== 0) {
        var sp2 = Math.abs(r.sMul) > 1 ? Math.abs(r.sMul) : 1;
        r.lPh += 0.45*sp2; r.bY = Math.sin(r.lPh)*2.5; r.wob = Math.sin(r.lPh*0.5)*1.5;
      } else { r.bY = 0; r.wob = 0; }
    });

    ctx.clearRect(0, 0, W, canvas.height);
    ctx.fillStyle = '#FFF5E8'; ctx.fillRect(0, 0, W, canvas.height);

    racers.forEach(function(r, i) {
      var ly = 28 + i*lH;
      ctx.fillStyle = i%2===0 ? '#FFF8F0' : '#FFF0E0';
      ctx.fillRect(0, ly, W, lH);
      ctx.strokeStyle = '#FFD5A8'; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(TS, ly+lH); ctx.lineTo(TE, ly+lH); ctx.stroke();
      ctx.fillStyle = r.lc; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'left';
      ctx.fillText(r.p.name.substring(0,4), 3, r.lY+4);
      if (r.fRank) {
        ctx.fillStyle = r.fRank===1?'#FFD700':r.fRank===2?'#C0C0C0':r.fRank===3?'#CD7F32':'#AAA';
        ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'right';
        ctx.fillText(r.fRank + '위', W-4, r.lY+4); ctx.textAlign = 'left';
      }
    });

    ctx.fillStyle = '#FF6B35'; ctx.fillRect(TE-2.5, 28, 2.5, n*lH);
    ctx.font = '15px serif'; ctx.textAlign = 'center'; ctx.fillText('🏁', TE, 20); ctx.textAlign = 'left';
    ctx.strokeStyle = '#FFB080'; ctx.lineWidth = 1.5; ctx.setLineDash([3,7]);
    ctx.beginPath(); ctx.moveTo(TS, 28); ctx.lineTo(TS, 28+n*lH); ctx.stroke();
    ctx.setLineDash([]);

    racers.forEach(function(r) {
      var sc = sprites[r.p.hi];
      var cy = r.lY + r.bY;
      var sH = Math.min(lH-5, 50), sW = sc ? (sc.width/sc.height)*sH : sH;
      ctx.save();
      ctx.translate(r.x, cy);
      if (r.wob) ctx.rotate(r.wob * Math.PI/180);
      if (r.sMul < 0) ctx.scale(-1, 1);
      if (r.evt === 'sleep') ctx.globalAlpha = 0.7;
      if (sc) ctx.drawImage(sc, -sW/2, -sH/2, sW, sH);
      ctx.restore();

      if (r.evt === 'boost' || r.evt === 'rocket' || r.evt === 'superboost') {
        ctx.save(); ctx.globalAlpha = 0.45;
        ctx.fillStyle = r.evt==='rocket' ? '#FF4500' : r.evt==='superboost' ? '#FFD700' : '#FFB347';
        for (var t2 = 0; t2 < 4; t2++) {
          ctx.beginPath(); ctx.arc(r.x-sW/2-t2*4-4, cy+(Math.random()-0.5)*sH*0.5, 3.5-t2*0.5, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
      }

      if (r.bub && r.bubT > 0) {
        var bA = Math.min(1, r.bubT/200);
        ctx.save(); ctx.globalAlpha = bA;
        ctx.font = 'bold 10px sans-serif';
        var tw = ctx.measureText(r.bub.t).width + 16, bh = 21;
        var bx = Math.max(2, Math.min(W-tw-2, r.x-tw/2));
        var by2 = cy - sH/2 - bh - 6;
        ctx.fillStyle = r.bub.c;
        if (ctx.roundRect) ctx.roundRect(bx, by2, tw, bh, 8);
        else ctx.rect(bx, by2, tw, bh);
        ctx.fill();
        ctx.beginPath(); ctx.moveTo(r.x-5, cy-sH/2-2); ctx.lineTo(r.x, cy-sH/2+6); ctx.lineTo(r.x+5, cy-sH/2-2); ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.textAlign = 'left'; ctx.fillText(r.bub.t, bx+8, by2+15);
        ctx.restore();
      }

      r.fems.forEach(function(fe) {
        ctx.save(); ctx.globalAlpha = fe.life;
        ctx.font = Math.round(fe.sz) + 'px serif'; ctx.textAlign = 'center';
        ctx.fillText(fe.e, r.x+fe.ox, cy+fe.oy);
        ctx.restore();
      });
    });

    if (fdone < n && el < 65000) {
      raf = requestAnimationFrame(frame);
    } else {
      racers.forEach(function(r) { if (!r.done) { r.done = true; fdone++; r.fRank = fdone; } });
      showBigAnnounce();
    }
  }

  function showBigAnnounce() {
    var html = '<div class="be">🎊🍽️🎊</div><h2>오늘 쏘는 사람!</h2><div class="ll">';
    raceResults.slice(0, winnerCount).forEach(function(p, i) {
      var md = i===0?'🥇':i===1?'🥈':i===2?'🥉':'🏅';
      html += md + ' <strong>' + p.name + '</strong>님<br>';
    });
    html += '</div><div class="bs">' + winnerCount + '위까지 한턱 쏩니다! 🎉</div>';
    baEl.innerHTML = html;
    baEl.style.display = 'flex';
    setTimeout(function() { baEl.style.display = 'none'; showResults(); }, 3500);
  }

  doCountdown(3, function() { st = null; lt = null; raf = requestAnimationFrame(frame); });
}

// ===== RESULTS =====
function showResults() {
  if (raf) { cancelAnimationFrame(raf); raf = null; }
  showScreen('result-screen');
  var wc = winnerCount;
  var winners = raceResults.slice(0, wc).map(function(p) { return p.name; }).join(', ');
  document.getElementById('ann-box').innerHTML = '<h2>🍽️ 오늘 쏘는 사람!</h2><p><strong>' + winners + '</strong>님이<br>기분 좋게 한턱 쏩니다! 🎉🎉🎉</p>';
  var list = document.getElementById('rlist');
  list.innerHTML = '';
  raceResults.forEach(function(p, i) {
    var rk = i + 1;
    var card = document.createElement('div');
    card.className = 'rcard' + (rk <= wc ? ' winner' : '');

    var rv = document.createElement('div');
    rv.className = 'rrank';
    rv.textContent = rk===1?'🥇':rk===2?'🥈':rk===3?'🥉':rk+'위';

    var cv = document.createElement('canvas');
    cv.width = 50; cv.height = 50;
    var sc = sprites[p.hi];
    if (sc) {
      var ctx2 = cv.getContext('2d');
      var s = Math.min(50/sc.width, 50/sc.height);
      ctx2.drawImage(sc, (50-sc.width*s)/2, (50-sc.height*s)/2, sc.width*s, sc.height*s);
    }

    var info = document.createElement('div');
    info.innerHTML = '<div class="rname">' + p.name + (rk<=wc ? '<span class="wbadge">한턱!</span>' : '') + '</div><div class="rsub">햄찌 #' + (p.hi+1) + '</div>';

    card.appendChild(rv);
    card.appendChild(cv);
    card.appendChild(info);
    list.appendChild(card);
  });
}

// ===== RESET =====
function resetGame() {
  if (raf) { cancelAnimationFrame(raf); raf = null; }
  players = []; selIdx = null; raceResults = [];
  document.getElementById('player-name').value = '';
  document.getElementById('plist-wrap').style.display = 'none';
  document.getElementById('big-announce').style.display = 'none';
  buildCarousel();
  showScreen('setup-screen');
}

// ===== DONATE =====
function openDonate() { document.getElementById('donate-modal').classList.add('open'); }
function closeDonate() { document.getElementById('donate-modal').classList.remove('open'); }
function copyAccount() {
  var t = '1000-6650-2887';
  if (navigator.clipboard) {
    navigator.clipboard.writeText(t).then(function() { alert('✅ 계좌번호 복사 완료!\n토스뱅크 ' + t); });
  } else {
    var ta = document.createElement('textarea');
    ta.value = t; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    alert('✅ 계좌번호 복사 완료!\n토스뱅크 ' + t);
  }
}
